<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pseudoGPT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #131314;
            --text: #e3e3e3;
            --input-pill: #1e1f20;
            --user-bubble: #2b2c2f;
            --accent: #8ab4f8;
            --max-width: 768px; /* The "Reading" sweet spot */
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centers everything */
        }

        /* Chat Container */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            width: 100%;
            max-width: var(--max-width); /* Keeps text from stretching too wide */
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .spacer { flex: 1; }

        /* USER MESSAGE (Tucked to the right) */
        .user-row {
            align-self: flex-end;
            max-width: 85%;
            background: var(--user-bubble);
            padding: 14px 24px;
            border-radius: 22px;
            border-bottom-right-radius: 4px;
            font-size: 1rem;
            line-height: 1.5;
        }

        /* AI MESSAGE (Typography Focused) */
        .ai-row {
            align-self: flex-start;
            display: flex;
            gap: 20px;
            width: 100%;
        }

        .ai-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(45deg, #4285f4, #9b72cb, #d96570);
            flex-shrink: 0;
            margin-top: 5px;
        }

        .ai-content {
            flex: 1;
            line-height: 1.75; /* Increased for readability */
            font-size: 1.05rem;
            color: var(--text);
            white-space: pre-wrap;
        }

        .source-label {
            display: block;
            margin-top: 15px;
            font-size: 11px;
            color: #777;
            font-weight: 500;
        }

        /* Floating Input Area */
        .input-wrapper {
            width: 100%;
            max-width: var(--max-width);
            padding: 20px;
            background: var(--bg);
        }

        .input-pill {
            background: var(--input-pill);
            border-radius: 32px;
            padding: 6px 20px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            outline: none;
            font-size: 1rem;
        }

        button {
            background: transparent;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 20px;
        }

        button:hover { background: rgba(138, 180, 248, 0.1); }

        /* Custom Scrollbar */
        #chat-window::-webkit-scrollbar { width: 5px; }
        #chat-window::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        /* Hide scrollbar for Chrome, Safari and Opera */
        #chat-window::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        #chat-window {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body>

<div id="chat-window">
    <div class="spacer"></div>
    <div class="ai-row">
        <div class="ai-avatar"></div>
        <div class="ai-content">Narrowed the view for better focus. I'm ready for your next prompt.</div>
    </div>
</div>

<div class="input-wrapper">
    <div class="input-pill">
        <input type="text" id="userInput" placeholder="Ask me..." autocomplete="off">
        <button id="sendBtn">Send</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    async function handleChat() {
        const text = userInput.value.trim();
        if (!text) return;

        // User (Right)
        const userDiv = document.createElement('div');
        userDiv.className = 'user-row';
        userDiv.innerText = text;
        chatWindow.appendChild(userDiv);

        userInput.value = '';
        scrollToBottom();

        // AI (Left)
        const aiRow = document.createElement('div');
        aiRow.className = 'ai-row';
        aiRow.innerHTML = '<div class="ai-avatar"></div><div class="ai-content">Thinking...</div>';
        chatWindow.appendChild(aiRow);

        const contentDiv = aiRow.querySelector('.ai-content');

        try {
            const res = await fetch(`bot.php?question=${encodeURIComponent(text)}`);
            const data = await res.json();

            contentDiv.innerHTML = '';
            await typeEffect(data.reply, contentDiv);

            const label = document.createElement('span');
            label.className = 'source-label';
            label.innerText = `✦ ${data.debug.source}`;
            contentDiv.appendChild(label);

        } catch (e) {
            contentDiv.innerText = "Error syncing with brain.";
        }
    }

    function typeEffect(text, el) {
        return new Promise(res => {
            let i = 0;
            function play() {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++;
                    scrollToBottom();
                    setTimeout(play, 12);
                } else res();
            }
            play();
        });
    }

    function scrollToBottom() { chatWindow.scrollTop = chatWindow.scrollHeight; }

    sendBtn.addEventListener('click', handleChat);
    userInput.addEventListener('keypress', e => { if(e.key === 'Enter') handleChat(); });
</script>

</body>
</html>
